# /home/p4b/civitas-goat-addon/vars/default.yml
---
goat_addon:
  namespace: "{{ inv_addons.goat.namespace | default(ENVIRONMENT + '-goat-stack') }}"
  chart:
    ref: "{{ inv_addons.goat.chart.ref | default('oci://ghcr.io/plan4better/charts/goat') }}"
    version: "{{ inv_addons.goat.chart.version | default('0.3.3') }}"
  db:
    central_db_ns: "{{ inv_central_db.ns_name }}"
    central_db_name: "central-db"
    # DB names. Defaults match upstream compose / chart conventions. Vary if
    # you need to co-tenant two installs in the same Postgres cluster — but
    # note windmill's *role names* (windmill_admin, windmill_user) are
    # hardcoded by its migrations regardless of DB name, so two installs
    # sharing one cluster would still collide on roles.
    goat_db_name: "{{ inv_addons.goat.db.goat_db_name | default('goat') }}"
    windmill_db_name: "{{ inv_addons.goat.db.windmill_db_name | default('windmill') }}"
  keycloak:
    # Client ID created in the civitas Keycloak realm. Defaults to `goat-web`,
    # matching the convention used by plan4better's standalone infra.
    client_id: "{{ inv_addons.goat.keycloak.client_id | default('goat-web') }}"
  web:
    # Public URL of the GOAT web frontend. Used for Keycloak redirect URIs
    # and NEXTAUTH_URL. Defaults to https://goat.<DOMAIN>.
    public_url: "{{ inv_addons.goat.web.public_url | default('https://goat.' + DOMAIN) }}"
  minio:
    # MinIO bucket name. DuckLake parquet files + uploaded assets land here.
    bucket: "{{ inv_addons.goat.minio.bucket | default('goat') }}"
  windmill:
    # Windmill workspace + bootstrap-admin credentials. Defaults match
    # plan4better's compose env (admin@windmill.dev / changeme) — change
    # in non-local environments.
    workspace: "{{ inv_addons.goat.windmill.workspace | default('goat') }}"
    admin_email: "{{ inv_addons.goat.windmill.admin_email | default('admin@windmill.dev') }}"
    admin_password: "{{ inv_addons.goat.windmill.admin_password | default('changeme') }}"
  health_check:
    retries: 30
    delay_seconds: 10
