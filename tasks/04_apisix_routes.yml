# /home/p4b/civitas-goat-addon/tasks/04_apisix_routes.yml
---
# Phase 2: register APISIX routes that front the GOAT services with OIDC
# enforcement via the civitas Keycloak. Pattern mirrors civitas's own
# task at core_platform/tasks/access/apis/add_api.yaml — same admin URL
# (https://api-admin.{{ DOMAIN }}), same ca_path, same admin_role key.

- name: "GOAT addon: build APISIX upstream node dicts"
  # Ansible does NOT evaluate Jinja2 expressions inside YAML dict keys, so
  # we build the upstream.nodes dicts via Jinja2 dict-literal expressions
  # in set_fact (same workaround as 01_db.yml).
  ansible.builtin.set_fact:
    apisix_upstream_core:
      "{{ {'goat-core.' + goat_addon.namespace + '.svc.cluster.local:80': 1} }}"
    apisix_upstream_web:
      "{{ {'goat-web.' + goat_addon.namespace + '.svc.cluster.local:80': 1} }}"

- name: "GOAT addon: register /goat/api/* route in APISIX"
  uri:
    method: PUT
    url: "https://api-admin.{{ DOMAIN }}/apisix/admin/routes/goat-api"
    ca_path: "{{ inv_k8s.ingress.ca_path | default(omit) }}"
    body_format: json
    body:
      uri: "/goat/api/*"
      name: "GOAT core API"
      desc: "Provisioned by civitas-goat-addon"
      methods: ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
      plugins:
        proxy-rewrite:
          # Strip /goat prefix before forwarding to goat-core's /api endpoint
          regex_uri: ["^/goat/api/(.*)", "/api/$1"]
        openid-connect:
          client_id: "{{ goat_addon.keycloak.client_id }}"
          client_secret: "{{ client_secret }}"
          discovery: "{{ inv_access.platform.hostname }}/realms/{{ inv_access.tenant.realm_name }}/.well-known/openid-configuration"
          bearer_only: true
          ssl_verify: false
      upstream:
        type: roundrobin
        scheme: http
        nodes: "{{ apisix_upstream_core }}"
    headers:
      Accept: application/json
      X-API-KEY: "{{ inv_access.apisix.api_credentials.admin_role }}"
    status_code: [200, 201]

- name: "GOAT addon: register /goat/web/* route in APISIX"
  uri:
    method: PUT
    url: "https://api-admin.{{ DOMAIN }}/apisix/admin/routes/goat-web"
    ca_path: "{{ inv_k8s.ingress.ca_path | default(omit) }}"
    body_format: json
    body:
      uri: "/goat/web/*"
      name: "GOAT web frontend"
      desc: "Provisioned by civitas-goat-addon"
      methods: ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
      plugins:
        proxy-rewrite:
          regex_uri: ["^/goat/web/(.*)", "/$1"]
      upstream:
        type: roundrobin
        scheme: http
        nodes: "{{ apisix_upstream_web }}"
    headers:
      Accept: application/json
      X-API-KEY: "{{ inv_access.apisix.api_credentials.admin_role }}"
    status_code: [200, 201]
