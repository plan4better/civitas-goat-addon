# /home/p4b/civitas-goat-addon/tasks/03_helm_install.yml
---
- name: Render goat values file
  ansible.builtin.template:
    src: "{{ playbook_dir }}/addons/goat_addon/templates/goat-values.yaml.j2"
    dest: "/tmp/goat-values-{{ goat_addon.namespace }}.yaml"
    mode: "0600"

- name: Helm install / upgrade GOAT chart
  kubernetes.core.helm:
    name: goat
    chart_ref: "{{ goat_addon.chart.ref }}"
    chart_version: "{{ goat_addon.chart.version }}"
    release_namespace: "{{ goat_addon.namespace }}"
    create_namespace: false
    values_files:
      - "/tmp/goat-values-{{ goat_addon.namespace }}.yaml"
    wait: true
    # Windmill server bootstraps its schema in Postgres on first start +
    # downloads worker images (~600MB each). 5m is too tight; 15m gives
    # local clusters enough headroom while still failing fast on hangs.
    wait_timeout: 15m
    atomic: true
    kubeconfig: "{{ KUBECONFIG | default(lookup('env', 'KUBECONFIG')) | default(lookup('env', 'HOME') + '/.kube/config') }}"
