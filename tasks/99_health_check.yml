# /home/p4b/civitas-goat-addon/tasks/99_health_check.yml
---
# We don't run an explicit `curl /api/healthz` inside the container because
# the goat-core image is stripped to essentials and ships no curl/wget.
# Instead we trust the Kubernetes readinessProbe (httpGet on /api/healthz,
# wired by the chart's templates/core/deployment.yaml). When kubelet flags
# `readyReplicas >= 1`, the probe has succeeded — so this check is
# equivalent to a manual curl plus the kubelet's retry/timeout policy.

- name: Wait for goat-core Deployment to be Available (readinessProbe → /api/healthz)
  kubernetes.core.k8s_info:
    kubeconfig: "{{ KUBECONFIG | default(lookup('env', 'KUBECONFIG')) | default(lookup('env', 'HOME') + '/.kube/config') }}"
    api_version: apps/v1
    kind: Deployment
    namespace: "{{ goat_addon.namespace }}"
    name: goat-core
  register: core_dep
  retries: "{{ goat_addon.health_check.retries }}"
  delay: "{{ goat_addon.health_check.delay_seconds }}"
  until:
    - core_dep.resources | length > 0
    - (core_dep.resources[0].status.readyReplicas | default(0)) >= 1

- name: Report success
  ansible.builtin.debug:
    msg: >
      ✓ goat-core is Available in namespace {{ goat_addon.namespace }}
      (readyReplicas={{ core_dep.resources[0].status.readyReplicas }} —
      readinessProbe on /api/healthz is succeeding).
