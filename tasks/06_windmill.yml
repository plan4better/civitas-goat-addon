# /home/p4b/civitas-goat-addon/tasks/06_windmill.yml
---
# Bootstrap Windmill: wait for the helm-deployed `windmill-server` pod, log in
# as the default superadmin, create the `goat` workspace, and mint an API
# token. The token lands in a K8s Secret `windmill-token` that `processes`
# consumes via a `secretKeyRef` (set up in templates/goat-values.yaml.j2).
#
# Order matters: this runs AFTER 03_helm_install (which deploys windmill
# server + workers) but BEFORE processes is functional for write-side
# requests. The processes deployment references the secret with
# `optional: true`, so pods come up before this step finishes; after the
# secret exists we trigger a rollout restart to pick it up.
#
# Plan4better's compose has the same bootstrap as a `windmill-init` service.
# We replicate the script content via ConfigMap instead of a volume mount.

- name: "GOAT addon: wait for windmill-server Deployment to be Available"
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    name: goat-windmill-server
    namespace: "{{ goat_addon.namespace }}"
    wait: true
    wait_condition:
      type: Available
      status: "True"
    wait_timeout: 300

- name: "GOAT addon: create windmill bootstrap script ConfigMap"
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: windmill-init-script
        namespace: "{{ goat_addon.namespace }}"
        labels:
          app.kubernetes.io/managed-by: civitas-goat-addon
      data:
        init.py: |
          """Bootstrap Windmill: login → create workspace → mint API token.
          Prints the token as the LAST line of stdout so the wrapping shell
          can extract it. Idempotent: re-running mints a fresh token."""
          import json
          import os
          import sys
          import time
          from urllib.error import HTTPError, URLError
          from urllib.request import Request, urlopen

          BASE = os.environ["WINDMILL_URL"].rstrip("/")
          WS = os.environ.get("WINDMILL_WORKSPACE", "goat")
          EMAIL = os.environ.get("WINDMILL_ADMIN_EMAIL", "admin@windmill.dev")
          PASS = os.environ.get("WINDMILL_ADMIN_PASSWORD", "changeme")

          def api(path, method="GET", body=None, token=None, json_resp=True):
              req = Request(f"{BASE}/api{path}", method=method)
              req.add_header("Content-Type", "application/json")
              if token:
                  req.add_header("Authorization", f"Bearer {token}")
              data = json.dumps(body).encode() if body is not None else None
              with urlopen(req, data=data, timeout=30) as r:
                  raw = r.read().decode()
              if not raw:
                  return {} if json_resp else ""
              try:
                  return json.loads(raw)
              except json.JSONDecodeError:
                  return raw.strip()

          # 1. Wait for server
          for i in range(60):
              try:
                  v = api("/version", json_resp=False)
                  print(f"windmill ready: version={v!r}", file=sys.stderr)
                  break
              except (HTTPError, URLError, TimeoutError) as e:
                  print(f"  wait... {e}", file=sys.stderr)
                  time.sleep(2)
          else:
              sys.exit("windmill server never became ready")

          # 2. Login
          session = api("/auth/login", method="POST",
                        body={"email": EMAIL, "password": PASS},
                        json_resp=False)
          if not session or not isinstance(session, str):
              sys.exit(f"login failed: {session!r}")
          print("logged in", file=sys.stderr)

          # 3. Create workspace (idempotent: ignore "already exists")
          try:
              api("/workspaces/create", method="POST",
                  body={"id": WS, "name": WS}, token=session,
                  json_resp=False)
              print(f"created workspace: {WS}", file=sys.stderr)
          except Exception as e:
              # Server responds 400 with "Workspace already exists" body —
              # don't try to parse, just treat any failure as "exists or
              # benign" and move on. The token-mint below will fail loudly
              # if the workspace is genuinely missing.
              print(f"workspace create skipped: {e}", file=sys.stderr)

          # 4. Mint a non-expiring API token
          token = api("/users/tokens/create", method="POST",
                      body={"label": "civitas-goat-addon", "expiration": None},
                      token=session, json_resp=False)
          if not token or not isinstance(token, str):
              sys.exit(f"token mint failed: {token!r}")

          # Print to stdout — caller's wrapper grabs the LAST stdout line.
          print(token)

- name: "GOAT addon: clean up prior windmill-init Job"
  kubernetes.core.k8s:
    state: absent
    api_version: batch/v1
    kind: Job
    name: windmill-init
    namespace: "{{ goat_addon.namespace }}"
    wait: true

# `kubernetes.core.k8s` Job-deletion cascades to the Pod by default, but Jobs
# from earlier addon runs can leave orphaned pods that linger past the new
# Job's `ttlSecondsAfterFinished`. Reap them explicitly so the token grabber
# below only sees the current run's pod.
- name: "GOAT addon: reap orphaned windmill-init pods"
  ansible.builtin.command:
    cmd: >-
      kubectl -n {{ goat_addon.namespace }} delete pod
      -l job-name=windmill-init --ignore-not-found
  changed_when: false

- name: "GOAT addon: run windmill bootstrap Job"
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: windmill-init
        namespace: "{{ goat_addon.namespace }}"
        labels:
          app.kubernetes.io/managed-by: civitas-goat-addon
      spec:
        backoffLimit: 3
        ttlSecondsAfterFinished: 600   # keep around long enough to grab logs
        template:
          spec:
            restartPolicy: OnFailure
            containers:
              - name: init
                image: python:3.11-slim
                env:
                  - name: WINDMILL_URL
                    value: "http://goat-windmill-server"
                  - name: WINDMILL_WORKSPACE
                    value: "{{ goat_addon.windmill.workspace }}"
                  - name: WINDMILL_ADMIN_EMAIL
                    value: "{{ goat_addon.windmill.admin_email }}"
                  - name: WINDMILL_ADMIN_PASSWORD
                    value: "{{ goat_addon.windmill.admin_password }}"
                command: ["python", "/scripts/init.py"]
                volumeMounts:
                  - { name: script, mountPath: /scripts, readOnly: true }
            volumes:
              - name: script
                configMap:
                  name: windmill-init-script

- name: "GOAT addon: wait for windmill bootstrap Job to complete"
  kubernetes.core.k8s_info:
    api_version: batch/v1
    kind: Job
    name: windmill-init
    namespace: "{{ goat_addon.namespace }}"
    wait: true
    wait_condition:
      type: Complete
      status: "True"
    wait_timeout: 180

- name: "GOAT addon: capture windmill token from Job pod logs"
  # Pipe `kubectl logs --tail=1 -l job-name=...` through `tail -1` to handle
  # the case where multiple pods exist for the same job (succeeded pods are
  # GC'd lazily) — we want the LAST line only, which corresponds to the most
  # recent pod's final stdout (the printed token).
  ansible.builtin.shell:
    cmd: >-
      kubectl -n {{ goat_addon.namespace }} logs
      -l job-name=windmill-init --tail=1 --prefix=false | tail -1
  register: windmill_token_log
  changed_when: false

- name: "GOAT addon: persist windmill token in Secret"
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: windmill-token
        namespace: "{{ goat_addon.namespace }}"
        labels:
          app.kubernetes.io/managed-by: civitas-goat-addon
      type: Opaque
      stringData:
        token: "{{ windmill_token_log.stdout | trim }}"

# The processes Deployment references `windmill-token` with `optional: true`
# (see templates/goat-values.yaml.j2). On first install the pod started without
# the secret; restart it now so WINDMILL_TOKEN is actually set.
- name: "GOAT addon: rollout-restart processes to pick up new windmill token"
  ansible.builtin.command:
    cmd: >-
      kubectl -n {{ goat_addon.namespace }} rollout restart deployment goat-processes
  changed_when: true
  failed_when: false   # processes may not exist if it's been disabled
